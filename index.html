<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floor Planner</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div id="login-screen" class="login-wrapper">
        <div class="login-box">
            <h2>Welcome</h2>
            <p>Please log in to design your floor plan.</p>
            
            <input type="email" id="emailInput" placeholder="Email address">
            <input type="password" id="passwordInput" placeholder="Password">
            
            <p id="authError" style="color: #ff4444; font-size: 14px; display: none;">Hibás felhasználónév vagy jelszó!</p>
            
            <button id="loginBtn" class="tool-btn active" style="width: 100%; text-align: center; margin-top: 10px;">Login</button>
            <button id="registerBtn" class="tool-btn" style="width: 100%; text-align: center; margin-top: 10px;">Create Account</button>
        </div>
    </div>

    <div class="main-wrapper" id="main-app" style="display: none;">
        
        <div class="toolbar left-toolbar">
            <h2>Toolbar</h2>
            <button id="wallsBtn" class="tool-btn active">Walls</button>
            <button id="windowsBtn" class="tool-btn">Windows</button>
            <button id="doorsBtn" class="tool-btn">Doors</button>
            
            <div class="separator"></div>
            <button id="ninetyDegreeBtn" class="ninety-degree-btn">90° mode OFF</button>

            <h2 style="margin-top: 20px;">Blueprint settings</h2>
            <label for="bgUpload" class="tool-btn" style="text-align: center; display: block; background-color: #F4F0E4; color: rgb(41, 40, 40); cursor: pointer;">
                Upload Blueprint
            </label>
            <input type="file" id="bgUpload" accept="image/*" style="display: none;">
                <p style="font-size: 14px; margin-bottom: 5px;">Opacity:<span id="opacityDisplay">1</span></p>
            <input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="1" style="width: 100%;">

            <button id="isDrawingBtn" class="isDrawing-btn" style="background-color: #44A194;width: 100%; text-align: center; margin-top: 10px;">Show Plans: On</button>

            <div class="separator"></div>
            <button id="clearBtn" class="clear-btn">Clear all</button>           
            <button id="logoutBtn" class="clear-btn" style="background-color: #34495e; margin-top: 10px;">Logout</button>
        </div>
        
        <div class="canvas-container">
            <canvas id="floorplan" width="1000" height="700"></canvas>
        </div>

        <div class="right-sidebar">
            <div class="toolbar right-widget">
                <h2>Furniture</h2>
                <button class="tool-btn furniture-btn" data-type="bed">Bed</button>
                <button class="tool-btn furniture-btn" data-type="sofa">Sofa</button>
                <button class="tool-btn furniture-btn" data-type="table">Table</button>
            </div>
            <div class="toolbar" id="wallSettingsWidget" style="display:flex";>
                <h2>Wall Settings</h2>
                <p style="font-size: 15px; margin-bottom: 5px;">Thickness:<span id="thicknessDisplay">20</span></p>
                <input type="range" id="thicknessSlider" min="5" max="40" value="20" style="width: 100;">
            </div>
            <div class="toolbar" id="furnitureSettingsWidget" style="display:none";>
                <h2>Furniture Settings</h2>
                <p style="font-size: 15px; margin-bottom: 5px;">Size:<span id="sizeDisplay">100</span></p>
                <input type="range" id="sizeSlider" min="10" max="200" value="100" style="width: 100;">
            </div>
            
            <div class="toolbar properties-widget">
                <h2>Properties</h2>
                <div class="databar">
                    <p>Selected: <span id="infoType">-</span></p>
                    <p>Size: <span id="infoSize">-</span></p>
                </div>
                
                <button id="saveToCloudBtn" class="tool-btn" style="align-content: center; margin-top: 3px; background-color: #176939; width: 100%; text-align: center;">Save to cloud</button>
                <button id="saveAsPNGBtn" class="tool-btn" style="margin-top: 3px; background-color: #176939; width: 100%; text-align: center;">Save as PNG</button>
                <button id="saveAsPDFBtn" class="tool-btn" style="margin-top: 3px; background-color: #176939; width: 100%; text-align: center;">Save as PDF</button>

            </div>
        </div> 
    </div>

    <script src="state.js"></script>
    <script src="auth.js"></script> 
    <script src="helpers.js"></script>
    <script src="draw.js"></script>
    <script src="events.js"></script>
</body>
</html>
